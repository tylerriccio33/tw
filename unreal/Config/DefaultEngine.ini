; The campaign has no .umap: ACampaignGameMode spawns the sun, the sky, the sea
; and ACampaignMap at BeginPlay, exactly as Main.gd built its whole scene in
; code. So the startup map is a stock empty level and the game mode does the
; rest — which is why there is nothing authored under Content/ but the baked
; JSON, and nothing to drift out of step with the simulation.
; Shader development mode. TerrainCommon.ush is the one part of this project
; that is iterated on by looking at it rather than by running a test, and
; without this every edit to it costs a full relaunch. With it, `recompileshaders
; changed` in the console reloads the .ush in the running game — which is what
; makes the edit/view loop seconds instead of tens of seconds. See
; unreal/Shots/README.md; `make unreal-live` starts a session set up for it.
[SystemSettings]
r.ShaderDevelopmentMode=1

