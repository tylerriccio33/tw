; TotalWarlike engine config.
;
; This file is the CODE-OWNED half of "how the game looks and runs". The other
; half is Content/Python/tw (actors, materials, lighting, grade). Everything here
; is base render quality + the plumbing that lets an agent drive the editor over
; Python. There is no C++ module, so this is the only .ini that matters.

[/Script/EngineSettings.GameMapsSettings]
; No authored .umap. tw.world.build_world() spawns the whole scene into whatever
; empty level the editor opens, the same way the old CampaignGameMode did at
; BeginPlay — so the "level" is code, not a binary asset.
EditorStartupMap=/Engine/Maps/Templates/OpenWorld.OpenWorld
GameDefaultMap=/Engine/Maps/Templates/OpenWorld.OpenWorld

; --- Python: the entire agent-facing surface ------------------------------------

[/Script/PythonScriptPlugin.PythonScriptPluginSettings]
; init_unreal.py auto-runs at editor startup and puts tw/ on sys.path.
bDeveloperMode=True
; Remote Execution is what makes the tight loop possible: `twctl exec` pushes a
; snippet into an already-running editor over UDP instead of paying a relaunch.
bRemoteExecution=True
RemoteExecutionMulticastGroupEndpoint=239.0.0.1:6766
RemoteExecutionMulticastBindAddress=127.0.0.1
RemoteExecutionSendBufferSizeBytes=2097152
RemoteExecutionReceiveBufferSizeBytes=2097152
RemoteExecutionMulticastTtl=0

; --- Base render quality the code-owned grade sits on top of --------------------

[/Script/Engine.RendererSettings]
r.DefaultFeature.AutoExposure=False
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.Lumen.HardwareRayTracing=False
r.Nanite.ProjectEnabled=True
r.Shadow.Virtual.Enable=1
r.AntiAliasingMethod=4
r.VirtualTextures=True
r.VirtualTexturedLightmaps=True
; Runtime Virtual Texture backs the layered terrain material (grass/arid/rock/snow)
; so the landscape reads a baked page instead of blending every layer per pixel.
r.VT.EnableAutoImport=True
r.GenerateMeshDistanceFields=True

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_Default

[/Script/AndroidFileServerEditor.AndroidFileServerRuntimeSettings]
bEnablePlugin=True
bAllowNetworkConnection=True
SecurityToken=AE223A78474644C6FD1B44A42950BDA6
bIncludeInShipping=False
bAllowExternalStartInShipping=False
bCompileAFSProject=False
bUseCompression=False
bLogFiles=False
bReportStats=False
ConnectionType=USBOnly
bUseManualIPAddress=False
ManualIPAddress=

