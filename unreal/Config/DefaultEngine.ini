; The campaign has no .umap: ACampaignGameMode spawns the sun, the sky, the sea
; and ACampaignMap at BeginPlay, exactly as Main.gd built its whole scene in
; code. So the startup map is a stock empty level and the game mode does the
; rest — which is why there is nothing authored under Content/ but the baked
; JSON, and nothing to drift out of step with the simulation.
; Shader development mode. TerrainCommon.ush is the one part of this project
; that is iterated on by looking at it rather than by running a test, and
; without this every edit to it costs a full relaunch. With it, `recompileshaders
; changed` in the console reloads the .ush in the running game — which is what
; makes the edit/view loop seconds instead of tens of seconds. See
; unreal/Shots/README.md; `make unreal-live` starts a session set up for it.
[SystemSettings]
r.ShaderDevelopmentMode=1

; Renderer quality — the "80% of how this looks that nobody had touched". The
; engine was running on stock defaults; this is where the modern-Unreal look
; (dynamic GI, sharp reflections, crisp far shadows) actually turns on. Every
; key here is a text cvar that diffs in a PR and shows up in `make unreal-shots`,
; so this file is the agent-native place to tune the base render — the lighting
; in CampaignGameMode::SpawnLighting sits on top of it.
;
; Lumen for global illumination + reflections: the map is one large outdoor
; scene under a single directional sun, exactly Lumen's best case, and it gives
; the shadowed north faces real bounced fill instead of the flat SkyLight ambient.
[/Script/Engine.RendererSettings]
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.Lumen.HardwareRayTracing=0
r.Lumen.TraceMeshSDFs=1
; Nanite + virtual shadow maps: VSM is the shadow path Lumen expects, and it is
; what makes the exaggerated terrain silhouette read at the map's ~124 km extent
; instead of dissolving into cascade seams.
r.Nanite=1
r.Shadow.Virtual.Enable=1
; Screen-space AO/GI as a cheap floor under Lumen, and TSR for a clean AA that
; holds up in the fixed-camera golden shots.
r.AmbientOcclusionStaticFraction=1
r.AntiAliasingMethod=4
; Post-process defaults: filmic tonemapper + bloom on, so the code-spawned
; PostProcessVolume in CampaignGameMode has a sane base to grade from.
r.DefaultFeature.Bloom=True
r.DefaultFeature.AutoExposure=False
r.Tonemapper.Quality=5

